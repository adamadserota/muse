services:
  sunobrainapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8094:8094"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8094/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
